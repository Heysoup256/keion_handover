<!DOCTYPE html>
<html lang="ja">

<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>申請結果 - 軽音部 引き継ぎ資料</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    .title.success { color: #4caf93; }
    .title.error { color: #ff8a80; }
    .email {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255,255,255,0.05);
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .message {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
      white-space: pre-line;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c83ff, #5c64e4);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 131, 255, 0.4); }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
  </style>
</head>

<body>
  <div class="card">
    <? if (success) { ?>
      <div class="icon">🎉</div>
      <h1 class="title success">アクセス権を付与しました</h1>
      
      <? if (email) { ?>
        <div class="email"><?= email ?></div>
      <? } ?>
      
      <p class="message"><?= message ?></p>
      
      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
        <a href="https://sites.google.com/view/keion2026handover/" class="btn btn-primary" target="_top">
          Google Sites (引き継ぎサイト) を開く
        </a>
        <a href="https://drive.google.com/drive/folders/1BwwB04_N6iHWhcBoRlnVBs0wHzgPRoe3?usp=drive_link" class="btn btn-secondary" target="_top" style="background: rgba(255, 255, 255, 0.15);">
          Google Drive (資料フォルダ) を開く
        </a>
      </div>
    <? } else { ?>
      <div class="icon">❌</div>
      <h1 class="title error">認証エラー</h1>
      
      <? if (email) { ?>
        <div class="email"><?= email ?></div>
      <? } ?>
      
      <p class="message"><?= message ?></p>
      
      <button class="btn btn-secondary" onclick="window.history.back();">
        戻ってやり直す
      </button>
    <? } ?>
  </div>
</body>

</html>
