<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>申請結果 - 軽音部 引き継ぎ資料</title>

  <style>
    /* ===== Reset & Base ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      padding: 20px;
    }

    /* ===== Card ===== */
    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    /* ===== Result Details ===== */
    .result-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    
    .title.success {
      color: #4caf93;
    }

    .title.error {
      color: #ff8a80;
    }

    .message {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
      white-space: pre-line;
      margin-bottom: 24px;
    }
    
    .user-email {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
    }

    /* ===== Button ===== */
    .btn {
      display: inline-block;
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #7c83ff, #5c64e4);
      color: #fff;
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-1px);
    }
    
    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(124, 131, 255, 0.35);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

<body>
  <div class="card">
    <? if (success) { ?>
      <!-- 成功画面 -->
      <div class="result-icon">🎉</div>
      <h1 class="title success">アクセス権を付与しました</h1>
      
      <? if (email) { ?>
      <div class="user-email"><?= email ?></div>
      <? } ?>
      
      <p class="message"><?= message ?></p>
      
      <a href="https://drive.google.com" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
        Google Drive を開く
      </a>
      
    <? } else { ?>
      <!-- エラー画面 -->
      <div class="result-icon">❌</div>
      <h1 class="title error">認証エラー</h1>
      
      <? if (email) { ?>
      <div class="user-email"><?= email ?></div>
      <? } ?>
      
      <p class="message"><?= message ?></p>
      
      <a href="javascript:history.back()" class="btn btn-secondary">
        入力画面に戻る
      </a>
    <? } ?>
    
    <div class="footer">
      軽音部 引き継ぎ認証システム
    </div>
  </div>
</body>

</html>
